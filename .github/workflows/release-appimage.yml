name: Release AppImage

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build-appimage:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Check version
        run: |
          TAG=${{ github.ref_name }}
          PROPERTIES_PATH=gradle.properties
          APP_VERSION=$(awk -F'=' '/^app.version/ {print $2}' "$PROPERTIES_PATH")
          if [ "$TAG" != "$APP_VERSION" ]; then
            echo "Tag $TAG does not match app version $APP_VERSION"
            exit 1
          fi

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 zsync patchelf fakeroot desktop-file-utils

      - name: Download appimagetool
        run: |
          echo "Downloading appimagetool..."
          curl -LO https://github.com/AppImage/AppImageKit/releases/latest/download/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: "corretto"

      - name: Build AppDir
        uses: gradle/gradle-build-action@v2
        with:
          arguments: packageAppImage

      - name: Package AppImage manually
        run: |
          VERSION=${{ github.ref_name }}
          APPDIR=build/compose/binaries/main/app/vLabeler

          if [ ! -d "$APPDIR" ]; then
            echo "AppDir not found at: $APPDIR"
            ls -R build/compose/binaries/main/app || true
            exit 1
          fi

          echo "Packaging AppImage from: $APPDIR"
          ./appimagetool-x86_64.AppImage "$APPDIR" "vlabeler-$VERSION-x86_64.AppImage"

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          prerelease: true
          files: |
            vlabeler-${{ github.ref_name }}-x86_64.AppImage
