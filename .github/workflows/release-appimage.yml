name: Release AppImage

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build-appimage:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Check version
        run: |
          TAG=${{ github.ref_name }}
          PROPERTIES_PATH=gradle.properties
          APP_VERSION=$(awk -F'=' '/^app.version/ {print $2}' "$PROPERTIES_PATH")
          if [ "$TAG" != "$APP_VERSION" ]; then
            echo "Tag $TAG does not match app version $APP_VERSION"
            exit 1
          fi

      - name: Install AppImage dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfuse2 zsync patchelf fakeroot desktop-file-utils

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Build AppImage
        uses: gradle/gradle-build-action@v2
        with:
          arguments: packageAppImage

      - name: Debug - Show compose output structure
        run: |
          echo "=== build/compose/binaries ==="
          ls -R build/compose/binaries || true

      - name: Upload Compose Output (for inspection)
        uses: actions/upload-artifact@v3
        with:
          name: compose-binaries-debug
          path: build/compose/binaries

      - name: Rename AppImage
        run: |
          VERSION=${{ github.ref_name }}
          OUTPUT_DIR=build/compose/binaries/main/app

          # Find executable AppImage
          APPIMAGE_FILE=$(find "$OUTPUT_DIR" -maxdepth 1 -type f -executable | head -n 1)

          if [ -z "$APPIMAGE_FILE" ]; then
            echo "AppImage not found!"
            ls -R build/compose/binaries/main/app
            exit 1
          fi

          mv "$APPIMAGE_FILE" "./vlabeler-$VERSION-x86_64.AppImage"

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          prerelease: true
          files: |
            vlabeler-${{ github.ref_name }}-x86_64.AppImage
